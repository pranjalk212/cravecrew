<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CraveCrew</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="login1.css">
</head>
<body>
    <!-- Navbar -->
    <div class="nav d-flex align-items-center justify-content-between">
        <div class="logo">
            <h2>CRAVECREW</h2>
        </div>
        <div class="navlinks">
            <ul>
                <li><a class="navborder" href="home.html">Home</a></li>
                <li><a class="navborder" href="home.html#contact">Contact</a></li>
                <li><a class="navborder" href="ven-chai.html">About</a></li>
                <li><a class="navborder" href="about.html">Website Creators</a></li>
                <li><a class="navborder" href="ven-chai.html">About</a></li>
            </ul>
        </div>
    </div>

    <!-- Login Form -->
    <div class="login-container">
        <div class="login-card">
            <h3>Welcome Back!</h3>
            <form>
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember Me</label>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>
                <div class="text-center mt-3">
                    <a href="#" class="btn-link">Forgot Password?</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 CraveCrew. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

</div>
</body>
</html>
