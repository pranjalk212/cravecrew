<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - CraveCrew</title>
    <style>
        /* General Styles */
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
        }

        /* Background Video Styling */
        .hero video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Dark Overlay */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Dark overlay for text visibility */
            z-index: 2;
        }

        .hero-content {
            z-index: 3;
            position: relative;
            padding: 20px;
        }

        .hero-content h1 {
            font-size: 3rem;
            margin: 0 0 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero-content p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .back-home-btn {
            text-decoration: none;
            background: #ff5722;
            color: #fff;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .back-home-btn:hover {
            background: #e64a19;
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 10px 0;
            background: #333;
            color: #fff;
            position: absolute;
            bottom: 0;
            width: 100%;
            z-index: 3;
        }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <section class="hero">
        <!-- Background Video -->
        <video autoplay muted loop>
            <source src="toconvert/IMG_5094.MOV" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <!-- Overlay -->
        <div class="hero-overlay"></div>

        <!-- Content -->
        <div class="hero-content">
            <h1>Thank You for Your Order!</h1>
            <p>We've received your order and are preparing it with love. Your delicious meal will arrive soon!</p>
            <a href="home.html" class="back-home-btn">Back to Home</a>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 CraveCrew. All rights reserved.</p>
    </footer>

</body>
</html>
