<body>

            <a class="navbar-brand" href="index.html">
                <img src="logo.png" alt="CraveCrew Logo" width="30" height="30" class="d-inline-block align-text-top">
                CraveCrew
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>

                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

  <!-- Hero Section with Background Video -->
<header class="order-hero">
    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source src="Website videos/VID-20241013-WA0021.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <div class="hero-content text-center text-light">
        <h1 class="display-4">Order Now</h1>
        <p class="lead">Fill in the details below to place your order. We'll handle the rest!</p>
    </div>
</header>


    <!-- Order Form Section -->
    <section class="order-form py-5">
        <div class="container">
            <h2 class="text-center mb-4">Order Details</h2>
            <form action="submit-order.php" method="POST">
                <!-- Personal Details -->
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
                    </div>
                    <div class="col-md-6">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="Enter your phone number" required>
                    </div>
                    <div class="col-md-12">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <!-- Address Details -->
                <div class="row g-3 mt-3">
                    <div class="col-md-6">
                        <label for="address" class="form-label">Delivery Address</label>
                        <input type="text" class="form-control" id="address" name="address" placeholder="Enter your address" required>
                    </div>
                    <div class="col-md-6">
                        <label for="landmark" class="form-label">Landmark</label>
                        <input type="text" class="form-control" id="landmark" name="landmark" placeholder="Optional">
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="row g-3 mt-3">
                    <div class="col-md-12">
                        <label for="order-summary" class="form-label">Order Summary</label>
                        <textarea class="form-control" id="order-summary" name="order-summary" rows="4" placeholder="Enter your food items here" required></textarea>
                    </div>
                </div>

                <!-- Payment Method -->
                <div class="row g-3 mt-3">
                    <div class="col-md-12">
                        <label class="form-label">Payment Method</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="payment-method" id="cod" value="cod" checked>
                            <label class="form-check-label" for="cod">Cash on Delivery</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="payment-method" id="online" value="online">
                            <label class="form-check-label" for="online">Online Payment</label>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">Place Order</button>
                </div>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-light py-3">
        <div class="container text-center">
            <p>&copy; 2024 CraveCrew. All rights reserved.</p>
        </div>
    </footer>

</body>
